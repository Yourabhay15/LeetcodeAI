<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leetcoder AI - Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0c10;
      --surface: rgba(26, 29, 38, 0.65);
      --surface-border: rgba(255, 255, 255, 0.08);
      --primary: #00f0ff;
      --primary-glow: rgba(0, 240, 255, 0.15);
      --success: #00e676;
      --success-glow: rgba(0, 230, 118, 0.15);
      --error: #ff1744;
      --error-glow: rgba(255, 23, 68, 0.15);
      --warning: #ffea00;
      --text: #f5f6f9;
      --text-muted: #8b949e;
      --font-outfit: 'Outfit', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(0, 240, 255, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(0, 230, 118, 0.04) 0%, transparent 45%),
        linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
      color: var(--text);
      font-family: var(--font-outfit);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Layout header */
    header {
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--surface-border);
      background: rgba(11, 12, 16, 0.8);
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-glow {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 15px var(--primary);
      animation: pulse 2s infinite alternate;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .solver-status-badge {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.9rem;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 600;
      border: 1px solid var(--surface-border);
      background: rgba(255, 255, 255, 0.03);
    }

    .solver-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
    }

    .solver-status-dot.active {
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
      animation: blink 1.5s infinite;
    }

    .solver-status-dot.authenticating {
      background: var(--warning);
      box-shadow: 0 0 8px var(--warning);
      animation: blink 1s infinite;
    }

    /* Main Container */
    main {
      flex: 1;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem;
      display: grid;
      grid-template-columns: 2.2fr 1fr;
      gap: 2rem;
    }

    @media (max-width: 1024px) {
      main {
        grid-template-columns: 1fr;
      }
    }

    /* Cards */
    .glass-card {
      background: var(--surface);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--surface-border);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      transition: border-color 0.3s ease;
    }

    .glass-card:hover {
      border-color: rgba(0, 240, 255, 0.15);
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.25rem;
      grid-column: 1 / -1;
    }

    .stat-card {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      position: relative;
      overflow: hidden;
    }

    .stat-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: var(--primary);
      opacity: 0.15;
    }

    .stat-card.solved::after { background: var(--success); opacity: 0.3; }
    .stat-card.failed::after { background: var(--error); opacity: 0.3; }

    .stat-label {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -1px;
    }

    /* Main Console Box */
    .console-section {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-height: 500px;
    }

    .console-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .console-title {
      font-weight: 600;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .console-controls {
      display: flex;
      gap: 0.5rem;
    }

    .btn-icon {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--surface-border);
      color: var(--text);
      padding: 0.4rem;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .btn-icon:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--primary);
    }

    .console-box {
      flex: 1;
      background: rgba(10, 11, 15, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 12px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      padding: 1.25rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      max-height: 550px;
      scroll-behavior: smooth;
      box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5);
    }

    .console-line {
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-all;
      animation: fadeIn 0.15s ease-out;
    }

    .line-tag {
      display: inline-block;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-right: 0.5rem;
      text-transform: uppercase;
    }

    .tag-success { background: var(--success-glow); color: var(--success); border: 1px solid rgba(0, 230, 118, 0.2); }
    .tag-error { background: var(--error-glow); color: var(--error); border: 1px solid rgba(255, 23, 68, 0.2); }
    .tag-warn { background: rgba(255, 234, 0, 0.08); color: var(--warning); border: 1px solid rgba(255, 234, 0, 0.2); }
    .tag-info { background: var(--primary-glow); color: var(--primary); border: 1px solid rgba(0, 240, 255, 0.2); }
    .tag-default { background: rgba(255, 255, 255, 0.05); color: var(--text-muted); }

    /* Control & Settings sidebar */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* Actions Panel */
    .actions-panel {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .action-button {
      width: 100%;
      padding: 0.9rem 1.5rem;
      border-radius: 10px;
      font-family: var(--font-outfit);
      font-weight: 700;
      font-size: 1rem;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.50rem;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .btn-start {
      background: linear-gradient(135deg, var(--primary) 0%, #00b0ff 100%);
      color: #050508;
      box-shadow: 0 4px 15px rgba(0, 240, 255, 0.25);
    }

    .btn-start:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 240, 255, 0.4);
    }

    .btn-start:active {
      transform: translateY(0);
    }

    .btn-stop {
      background: linear-gradient(135deg, var(--error) 0%, #c2185b 100%);
      color: #fff;
      box-shadow: 0 4px 15px rgba(255, 23, 68, 0.25);
    }

    .btn-stop:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 23, 68, 0.4);
    }

    .btn-stop:active {
      transform: translateY(0);
    }

    /* Settings Panel */
    .settings-panel {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .panel-title {
      font-size: 1.1rem;
      font-weight: 600;
      border-bottom: 1px solid var(--surface-border);
      padding-bottom: 0.5rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .form-label {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
    }

    .form-input {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--surface-border);
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      color: var(--text);
      font-family: var(--font-outfit);
      font-size: 0.9rem;
      outline: none;
      transition: all 0.2s ease;
    }

    .form-input:focus {
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 8px rgba(0, 240, 255, 0.1);
    }

    select.form-input {
      cursor: pointer;
    }

    select.form-input option {
      background-color: #161821;
      color: var(--text);
    }

    .btn-save {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--surface-border);
      color: var(--text);
      font-weight: 600;
      padding: 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 0.5rem;
    }

    .btn-save:hover {
      background: var(--primary-glow);
      border-color: var(--primary);
      color: var(--primary);
    }

    /* Keyframe Animations */
    @keyframes pulse {
      0% { box-shadow: 0 0 10px var(--primary); }
      100% { box-shadow: 0 0 25px var(--primary); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Scrollbars */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.1);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-container">
      <div class="logo-glow"></div>
      <h1>Leetcoder AI</h1>
    </div>
    <div class="solver-status-badge">
      <div class="solver-status-dot" id="statusDot"></div>
      <span id="statusText">Status: Idle</span>
    </div>
  </header>

  <main>
    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="glass-card stat-card">
        <span class="stat-label">Total Solved</span>
        <span class="stat-value" id="statsTotalSolved">0</span>
      </div>
      <div class="glass-card stat-card">
        <span class="stat-label">Remaining Queue</span>
        <span class="stat-value" id="statsRemaining">0</span>
      </div>
      <div class="glass-card stat-card solved">
        <span class="stat-label">Session Successes</span>
        <span class="stat-value" id="statsSessionSuccess" style="color: var(--success)">0</span>
      </div>
      <div class="glass-card stat-card failed">
        <span class="stat-label">Session Rejections</span>
        <span class="stat-value" id="statsSessionFailed" style="color: var(--error)">0</span>
      </div>
    </div>

    <!-- Log Console Card -->
    <div class="glass-card console-section">
      <div class="console-header">
        <div class="console-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          Console Logs
        </div>
        <div class="console-controls">
          <button class="btn-icon" id="clearLogsBtn" title="Clear console">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
      </div>
      <div class="console-box" id="consoleBox">
        <div class="console-line"><span class="line-tag tag-info">INFO</span>[System] Connecting to Leetcoder server...</div>
      </div>
    </div>

    <!-- Sidebar Control Card & Settings Card -->
    <div class="sidebar">
      <div class="glass-card actions-panel">
        <div class="panel-title">Solver Controls</div>
        <div id="activeProblemCard" style="display: none; padding: 0.75rem; border-radius: 8px; background: rgba(0, 240, 255, 0.05); border: 1px solid rgba(0, 240, 255, 0.15); margin-bottom: 0.5rem;">
          <span class="form-label" style="font-size: 0.75rem;">Active Problem</span>
          <div id="activeProblemText" style="font-weight: 700; font-size: 0.95rem; margin-top: 0.2rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">-</div>
        </div>
        <button class="action-button btn-start" id="startBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Start AI Solver
        </button>
        <button class="action-button btn-stop" id="stopBtn" style="display: none;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
          Stop Solver
        </button>
      </div>

      <div class="glass-card settings-panel">
        <div class="panel-title">AI Settings</div>
        <form id="settingsForm">
          <div class="form-group" style="margin-bottom: 1rem;">
            <label class="form-label" for="apiKeyInput">Groq API Key</label>
            <input class="form-input" type="password" id="apiKeyInput" placeholder="gsk_...">
          </div>
          <div class="form-group" style="margin-bottom: 1rem;">
            <label class="form-label" for="modelInput">Groq Model</label>
            <input class="form-input" type="text" id="modelInput" placeholder="llama-3.3-70b-versatile">
          </div>
          <div class="form-group" style="margin-bottom: 1rem;">
            <label class="form-label" for="pickModeSelect">Pick Mode</label>
            <select class="form-input" id="pickModeSelect">
              <option value="random">Randomized</option>
              <option value="sequential">Sequential (Alphabetical)</option>
              <option value="single">Single Target Problem</option>
            </select>
          </div>
          <div class="form-group" id="singleProblemGroup" style="display: none; margin-bottom: 1rem;">
            <label class="form-label" for="singleProblemInput">Target Problem Slug</label>
            <input class="form-input" type="text" id="singleProblemInput" placeholder="two-sum">
          </div>
          <button class="action-button btn-save" type="submit" id="saveBtn">Save Configuration</button>
        </form>
      </div>
    </div>
  </main>

  <script>
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const consoleBox = document.getElementById('consoleBox');
    const clearLogsBtn = document.getElementById('clearLogsBtn');
    const activeProblemCard = document.getElementById('activeProblemCard');
    const activeProblemText = document.getElementById('activeProblemText');

    const statsTotalSolved = document.getElementById('statsTotalSolved');
    const statsRemaining = document.getElementById('statsRemaining');
    const statsSessionSuccess = document.getElementById('statsSessionSuccess');
    const statsSessionFailed = document.getElementById('statsSessionFailed');

    const settingsForm = document.getElementById('settingsForm');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const modelInput = document.getElementById('modelInput');
    const pickModeSelect = document.getElementById('pickModeSelect');
    const singleProblemGroup = document.getElementById('singleProblemGroup');
    const singleProblemInput = document.getElementById('singleProblemInput');

    let sessionSuccessCount = 0;
    let sessionFailedCount = 0;

    // Toggle single problem input field based on select dropdown
    pickModeSelect.addEventListener('change', () => {
      if (pickModeSelect.value === 'single') {
        singleProblemGroup.style.display = 'flex';
      } else {
        singleProblemGroup.style.display = 'none';
      }
    });

    // Clear logs
    clearLogsBtn.addEventListener('click', () => {
      consoleBox.innerHTML = '';
    });

    // Fetch initial status and settings
    async function init() {
      try {
        const statusRes = await fetch('/api/status');
        const status = await statusRes.json();
        updateStatusUI(status);

        const configRes = await fetch('/api/config');
        const config = await configRes.json();
        apiKeyInput.value = config.GROQ_API_KEY || '';
        modelInput.value = config.GROQ_MODEL || 'llama-3.3-70b-versatile';
        pickModeSelect.value = config.PROBLEM_PICK_MODE || 'random';
        singleProblemInput.value = config.SINGLE_PROBLEM_NAME || '';
        if (config.PROBLEM_PICK_MODE === 'single') {
          singleProblemGroup.style.display = 'flex';
        }
      } catch (err) {
        addConsoleLine('error', '[System] Failed to communicate with Leetcoder backend.');
      }
    }

    // Save Settings
    settingsForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        GROQ_API_KEY: apiKeyInput.value.trim(),
        GROQ_MODEL: modelInput.value.trim(),
        PROBLEM_PICK_MODE: pickModeSelect.value,
        SINGLE_PROBLEM_NAME: singleProblemInput.value.trim()
      };
      
      try {
        const res = await fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const result = await res.json();
        if (result.success) {
          addConsoleLine('success', '[System] Settings saved successfully.');
        } else {
          addConsoleLine('error', '[System] Failed to save settings: ' + result.error);
        }
      } catch (err) {
        addConsoleLine('error', '[System] Network error saving configurations.');
      }
    });

    // Action Triggers
    startBtn.addEventListener('click', async () => {
      try {
        startBtn.disabled = true;
        const res = await fetch('/api/action/start', { method: 'POST' });
        const result = await res.json();
        if (result.success) {
          addConsoleLine('info', '[System] Starting Leetcoder Solver...');
        } else {
          addConsoleLine('error', '[System] Failed to trigger solver: ' + result.error);
          startBtn.disabled = false;
        }
      } catch (err) {
        addConsoleLine('error', '[System] Connection error when starting solver.');
        startBtn.disabled = false;
      }
    });

    stopBtn.addEventListener('click', async () => {
      try {
        stopBtn.disabled = true;
        const res = await fetch('/api/action/stop', { method: 'POST' });
        const result = await res.json();
        if (result.success) {
          addConsoleLine('warn', '[System] Stopping solver loop...');
        }
      } catch (err) {
        addConsoleLine('error', '[System] Connection error when stopping solver.');
        stopBtn.disabled = false;
      }
    });

    function updateStatusUI(status) {
      // Update badge status
      statusDot.className = 'solver-status-dot';
      if (status.status === 'solving') {
        statusDot.classList.add('active');
        statusText.textContent = 'Status: Active';
        startBtn.style.display = 'none';
        stopBtn.style.display = 'flex';
        stopBtn.disabled = false;
      } else if (status.status === 'authenticating') {
        statusDot.classList.add('authenticating');
        statusText.textContent = 'Status: Authenticating';
        startBtn.style.display = 'none';
        stopBtn.style.display = 'flex';
        stopBtn.disabled = false;
      } else {
        statusText.textContent = 'Status: Idle';
        startBtn.style.display = 'flex';
        startBtn.disabled = false;
        stopBtn.style.display = 'none';
      }

      // Update Active problem display
      if (status.currentProblem) {
        activeProblemCard.style.display = 'block';
        activeProblemText.textContent = status.currentProblem;
      } else {
        activeProblemCard.style.display = 'none';
      }

      // Update counters
      statsTotalSolved.textContent = status.solvedCount;
      const total = status.totalCount;
      const solved = status.solvedCount;
      const remaining = Math.max(0, total - solved);
      statsRemaining.textContent = remaining;
    }

    // Log streaming (Server Sent Events)
    const eventSource = new EventSource('/api/stream-logs');
    
    eventSource.onmessage = (event) => {
      const data = JSON.parse(event.data);
      addConsoleLine(data.type, data.log);
      
      // Parse specific tags to increment success/failed counters
      if (data.log.includes('[ACCEPTED]')) {
        sessionSuccessCount++;
        statsSessionSuccess.textContent = sessionSuccessCount;
      } else if (data.log.includes('[VERDICT_REJECTED]') || data.log.includes('[FAILED]')) {
        sessionFailedCount++;
        statsSessionFailed.textContent = sessionFailedCount;
      }
      
      // Periodically sync stats when status events occur
      if (data.log.includes('[ACCEPTED]') || data.log.includes('[NAVIGATING]') || data.log.includes('[QUEUED]') || data.log.includes('[SOLVED_EARLIER]')) {
        syncStatus();
      }
    };

    async function syncStatus() {
      try {
        const statusRes = await fetch('/api/status');
        const status = await statusRes.json();
        updateStatusUI(status);
      } catch (_) {}
    }

    // Periodically poll status to ensure frontend matches backend status
    setInterval(syncStatus, 5000);

    function addConsoleLine(type, text) {
      const line = document.createElement('div');
      line.className = 'console-line';

      const tag = document.createElement('span');
      tag.className = 'line-tag';

      // Assign type class
      if (type === 'success' || text.includes('[ACCEPTED]') || text.includes('[EDITOR_VALUE_SET]')) {
        tag.className += ' tag-success';
        tag.textContent = 'SUCCESS';
      } else if (type === 'error' || text.includes('[FAILED]') || text.includes('[FAILED_LOCAL_SAVE]') || text.includes('[VERDICT_REJECTED]')) {
        tag.className += ' tag-error';
        tag.textContent = 'ERROR';
      } else if (type === 'warn' || text.includes('[NAVIGATING]') || text.includes('[SWITCHING_LANGUAGE]') || text.includes('[SUBMITTING]')) {
        tag.className += ' tag-warn';
        tag.textContent = 'ACTION';
      } else if (type === 'info' || text.includes('[QUEUED]') || text.includes('[GQL_FETCH]') || text.includes('[GROQ_GENERATE]')) {
        tag.className += ' tag-info';
        tag.textContent = 'AI';
      } else {
        tag.className += ' tag-default';
        tag.textContent = 'LOG';
      }

      line.appendChild(tag);
      line.appendChild(document.createTextNode(text));
      
      consoleBox.appendChild(line);
      
      // Auto scroll if scrolled near bottom
      if (consoleBox.scrollHeight - consoleBox.scrollTop - consoleBox.clientHeight < 120) {
        consoleBox.scrollTop = consoleBox.scrollHeight;
      }
    }

    init();
  </script>
</body>
</html>
